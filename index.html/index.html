/* =========================

async function buscarNomeCidade(lat, lon) {

  try {

    const resposta = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pt`
    );

    const dados = await resposta.json();

    console.log("RETORNO NOMINATIM:", dados);

    if (dados?.address) {

      const cidadeNome =
        dados.address.city ||
        dados.address.town ||
        dados.address.village ||
        dados.address.municipality ||
        "";

      const estadoNome = dados.address.state || "";
      const paisNome = dados.address.country || "";
      const paisCode = dados.address.country_code?.toUpperCase() || "";

      if (cidadeNome) {
        nomeCidade.innerText =
          paisCode === "BR"
            ? `${cidadeNome} - ${estadoNome}`
            : `${cidadeNome} - ${paisNome}`;
      } else if (estadoNome) {
        nomeCidade.innerText = estadoNome;
      } else {
        nomeCidade.innerText = "📍Sua localização";
      }

      paisSelecionado = paisCode;
      estadoSelecionado = estadoNome;

    }

  } catch (erro) {
    console.log("Erro ao obter cidade:", erro);
    nomeCidade.innerText = "📍Sua localização";
  }
}

/* =========================

========================= */
function distanciaKm(lat1, lon1, lat2, lon2){
  const R = 6371; // raio da Terra em km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

async function buscarAutocomplete() {

  const termo = cidade.value.trim();
  lista.innerHTML = "";

  if (termo.length < 3) return;

  if (controller) controller.abort();
  controller = new AbortController();

  const normalizar = (texto) =>
    texto
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/['’`´-]/g, "")
      .replace(/\s+/g, "")
      .trim();

  try {

    async function consultar(nomeBusca) {
      const resp = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(nomeBusca)}&count=10&language=pt&format=json`,
        { signal: controller.signal }
      );
      return await resp.json();
    }

    let resultadosAPI = [];

    // 🔹 1️⃣ Busca termo original
    const original = await consultar(termo);
    if (original.results) resultadosAPI.push(...original.results);

    // 🔹 2️⃣ Se tiver "do oeste", buscar também "d'oeste"
    if (/do oeste/i.test(termo)) {
      const alterado = termo.replace(/do oeste/i, "d'oeste");
      const alt = await consultar(alterado);
      if (alt.results) resultadosAPI.push(...alt.results);
    }

    // 🔹 3️⃣ Se tiver "d'oeste", buscar também "do oeste"
    if (/d['’]?oeste/i.test(termo)) {
      const alterado = termo.replace(/d['’]?oeste/i, "do oeste");
      const alt = await consultar(alterado);
      if (alt.results) resultadosAPI.push(...alt.results);
    }

    if (resultadosAPI.length === 0) return;

    const buscaNormal = normalizar(termo);

    let resultados = resultadosAPI
      .filter(c => c.feature_code?.startsWith("P"))
      .filter((c, index, self) =>
        index === self.findIndex(t =>
          t.name.toLowerCase() === c.name.toLowerCase() &&
          t.admin1?.toLowerCase() === c.admin1?.toLowerCase() &&
          t.country_code === c.country_code
        )
      );

    resultados = resultados.map(c => {

      let score = 0;
      const nomeNormal = normalizar(c.name);

      if (nomeNormal === buscaNormal) score += 6000;
      if (nomeNormal.startsWith(buscaNormal)) score += 5000;
      if (nomeNormal.includes(buscaNormal)) score += 3000;

      if (c.feature_code === "PPLC") score += 3000;
      if (c.feature_code === "PPLA") score += 2000;

      if (c.country_code === "BR") score += 5000;

      if (c.population) {
        score += Math.min(c.population / 5000, 5000);
      }

      return { ...c, score };
    });

    resultados.sort((a, b) => b.score - a.score);

    resultados.slice(0, 7).forEach(c => {

      let local;
      let nomeExibicao = ajustarNomeExibicao(c.name, c.country_code);

      if (c.country_code === "BR" && c.admin1) {
        local = `${nomeExibicao} - ${c.admin1}`;
      } 
      else if (c.admin1) {
        local = `${nomeExibicao} - ${c.admin1} - ${c.country}`;
      } 
      else {
        local = `${nomeExibicao} - ${c.country}`;
      }

      const div = document.createElement("div");
      div.innerText = local;

      div.onclick = () => {
        cidade.value = local;
        nomeCidade.innerText = local;
        lat = c.latitude;
        lon = c.longitude;
        paisSelecionado = c.country_code;
        estadoSelecionado = c.admin1 ?? null;

        lista.innerHTML = "";
        limparTela();
        buscar_cidade();
      };

      lista.appendChild(div);
    });

  } catch (err) {
    if (err.name !== "AbortError") {
      console.error("Erro no autocomplete:", err);
    }
  }
}

function mostrarAlturaNuvens(atual) {

  if (!atual?.hourly?.time) {
    return { alturaNuvens: "-", cobertura: "-", tipo: "-", debug: "Sem hourly.time" };
  }

  const horaAtualAPI = atual.current_weather?.time;
  let idx = atual.hourly.time.findIndex(t => t === horaAtualAPI);
  if (idx === -1) idx = 0;

  const temp = atual.hourly.temperature_2m?.[idx];
  const rh   = atual.hourly.relativehumidity_2m?.[idx];
  const cobertura = atual.hourly.cloudcover?.[idx] ?? "-";

  if (temp == null || rh == null) {
    return { 
      alturaNuvens: "-", 
      cobertura, 
      tipo: "-", 
      debug: "Temp ou RH indefinido" 
    };
  }

  const a = 17.27;
  const b = 237.7;

  const alpha = ((a * temp) / (b + temp)) + Math.log(rh / 100);
  const dew = (b * alpha) / (a - alpha);

  let alturaNuvens = Math.round(222 * (temp - dew));
  if (alturaNuvens < 0) alturaNuvens = 0;

  let tipo;
  if (alturaNuvens === 0) {
    tipo = "Nevoeiro / solo";
  } else if (alturaNuvens < 2000) {
    tipo = "Baixas";
  } else if (alturaNuvens < 6000) {
    tipo = "Médias";
  } else {
    tipo = "Altas";
  }

  return { 
    alturaNuvens, 
    cobertura, 
    tipo,
    debug: `Temp:${temp}°C RH:${rh}% Dew:${dew.toFixed(1)}`
  };
}

/* =========================
   PM2.5 → US AQI
========================= */
function pm25ToUSAQI(pm25){
 if(pm25<=12) return Math.round((50/12)*pm25);
 if(pm25<=35.4) return Math.round(((100-51)/(35.4-12.1))*(pm25-12.1)+51);
 if(pm25<=55.4) return Math.round(((150-101)/(55.4-35.5))*(pm25-35.5)+101);
 if(pm25<=150.4) return Math.round(((200-151)/(150.4-55.5))*(pm25-55.5)+151);
 if(pm25<=250.4) return Math.round(((300-201)/(250.4-150.5))*(pm25-150.5)+201);
 if(pm25<=350.4) return Math.round(((400-301)/(350.4-250.5))*(pm25-250.5)+301);
 if(pm25<=500.4) return Math.round(((500-401)/(500.4-350.5))*(pm25-350.5)+401);
 return 500;
}

/* =========================
   HISTÓRICO MENSAL (12 MESES)
========================= */
async function buscarTemperaturasMensais(){
  const hoje = new Date();
  const inicio = new Date(hoje.getFullYear()-1, hoje.getMonth(), 1);

  const r = await fetch(
    `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
    `&start_date=${inicio.toISOString().split("T")[0]}` +
    `&end_date=${hoje.toISOString().split("T")[0]}` +
    `&daily=temperature_2m_min,temperature_2m_max,temperature_2m_mean` +
    `&timezone=auto`
  );
  const d = await r.json();
  if(!d?.daily?.time) return;
  const meses = {};
  d.daily.time.forEach((t,i)=>{
    const m = t.slice(0,7); // YYYY-MM
    meses[m] ??= {min:[], max:[], med:[]};
    meses[m].min.push(d.daily.temperature_2m_min[i]);
    meses[m].max.push(d.daily.temperature_2m_max[i]);
    meses[m].med.push(d.daily.temperature_2m_mean[i]);
  });
  const labels = [];
  const min = [];
  const max = [];
  const med = [];
  const nomesMes = [
  "Jan","Fev","Mar","Abr","Mai","Jun",
  "Jul","Ago","Set","Out","Nov","Dez"
];

Object.keys(meses).slice(-12).forEach(m=>{
  const [ano,mes] = m.split("-");

  labels.push(`${nomesMes[Number(mes)-1]}/${ano.slice(2)}`);

  min.push(media(meses[m].min).toFixed(1));
  max.push(media(meses[m].max).toFixed(1));
  med.push(media(meses[m].med).toFixed(1));
});

  montarGraficoMensal(labels, min, med, max);
}

function media(arr){
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function montarGraficoMensal(labels, min, med, max){
  chartMensal?.destroy();

  chartMensal = new Chart(
    document.getElementById("graficoMensal"),
    {
      type:"line",
      data:{
        labels,
        datasets:[
          {
            label:"Mínima(°C)",
            data:min,
            tension:.35,
            borderWidth:2,
            pointRadius:4
          },
          {
            label:"Média(°C)",
            data:med,
            tension:.35,
            borderWidth:3,
            pointRadius:4
          },
          {
            label:"Máxima(°C)",
            data:max,
            tension:.35,
            borderWidth:2,
            pointRadius:4
          }
        ]
      },
      options:{
        plugins:{
          title:{
            display:true,
            text:"Temperatura Mensal - últimos 12 Meses — Mín., Média e Máx.",
            font:{size:13, weight:"bold"},
            color:document.body.classList.contains("dark") ? "#e6edf3" : "#000"
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#006400", // verde escuro
              font: {
                size: 12,
                weight: "bold"
              }
            }
          },
          y: {
            ticks: {
              color: "#006400" // opcional: se quiser o eixo Y também verde escuro
            }
          }
        }
      }
    }
  );
}


function normalizarTexto(str) {
  return str
    .toLowerCase()
    .normalize("NFD") // separa acentos
    .replace(/[\u0300-\u036f]/g, "") // remove acentos
    .replace(/['’`´-]/g, "") // remove apóstrofo e hífen
    .replace(/\s+/g, "") // remove espaços
    .trim();
}

/* =========================
   Horário de ouro
========================= */
function calcularHorarioOuroCompacto(sunrise, sunset){
  // sunrise e sunset em formato "YYYY-MM-DDTHH:MM"
  const formatarHora = (d) => `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;

  const nascer = new Date(sunrise);
  const por = new Date(sunset);

  // Manhã: nascer do sol até +1h30
  const manhaInicio = nascer;
  const manhaFim = new Date(nascer.getTime() + 90*60*1000); // +1h30 em ms

  // Tarde: -1h30 até pôr do sol
  const tardeInicio = new Date(por.getTime() - 90*60*1000); 
  const tardeFim = por;

  return `${formatarHora(manhaInicio)} as ${formatarHora(manhaFim)} e ${formatarHora(tardeInicio)} as ${formatarHora(tardeFim)}`;
}

/* =========================
   LEVAR GUARDA-CHUVA
========================= */
function verificarChuvaDiaria(atual) {

  const agora = new Date();
  const limite = new Date(agora.getTime() + 3 * 60 * 60 * 1000); // +3 horas

  for (let i = 0; i < atual.hourly.time.length; i++) {

    const dataHoraAPI = new Date(atual.hourly.time[i]);

    // Verifica apenas entre agora e +3 horas
    if (dataHoraAPI >= agora && dataHoraAPI <= limite) {

      const chuva = atual.hourly.precipitation[i] ?? 0;
      const prob = atual.hourly.precipitation_probability[i] ?? 0;

      if (chuva > 0 || prob >= 10) {
        return "(Leve um)";
      }
    }
  }

  return "(Não necessita)";
}

/* =========================
   ALTURA DAS ONDAS (API MARINHA)
========================= */
async function buscarAlturaOnda(lat, lon) {
  try {
    const r = await fetch(
      `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height&timezone=auto`
    );

    if (!r.ok) return null;

    const d = await r.json();

    if (!d.hourly?.wave_height || !d.hourly?.time) return null;

    const agora = Date.now();
    let idx = 0;
    let menorDif = Infinity;

    d.hourly.time.forEach((t, i) => {
      const dif = Math.abs(new Date(t).getTime() - agora);
      if (dif < menorDif) {
        menorDif = dif;
        idx = i;
      }
    });

    const valor = d.hourly.wave_height[idx];

    return valor != null ? Number(valor) : null;

  } catch (e) {
    return null;
  }
}

function ajustarNomeExibicao(nome, countryCode) {

  // 🔒 Só aplica para Brasil
  if (countryCode !== "BR") return nome;

  return nome.replace(/d['’]([A-Za-zÀ-ÿ]+)/gi, (match, palavra) => {

    // Capitaliza corretamente a palavra
    const palavraFormatada =
      palavra.charAt(0).toUpperCase() + palavra.slice(1).toLowerCase();

    // Lista de palavras conhecidas masculinas
    const masculinas = [
      "Oeste", "Ouro", "Sul", "Norte", "Leste", "Cedro", "Campo"
    ];

    // Lista de palavras conhecidas femininas
    const femininas = [
      "Ávila", "Ilha", "Serra", "Lagoa"
    ];

    if (masculinas.includes(palavraFormatada))
      return "do " + palavraFormatada;

    if (femininas.includes(palavraFormatada))
      return "da " + palavraFormatada;

    // Se não souber, usa "de"
    return "de " + palavraFormatada;

  });

}

/* =========================
   Qualidade do Ar - FORMATADORES
========================= */
function formatarAQ(v){

 let classe = "";
 let texto = "";

 if (v <= 50) {
   classe = "aq-bom";
   texto = "(Boa)";
 }
 else if (v <= 100) {
   classe = "aq-mod";
   texto = "(Moderada)";
 }
 else if (v <= 150) {
   classe = "aq-ruim";
   texto = "(Insalubre)";
 }
 else if (v <= 200) {
   classe = "aq-muito";
   texto = "(Muito Insalubre)";
 }
 else if (v <= 300) {
   classe = "aq-severo";
   texto = "(Severo)";
 }
 else {
   classe = "aq-extremo";
   texto = "(Extrema)";
 }

 return `<span class="${classe}" data-aqi="${v}">${texto}</span>`;
}

 if(v<=0){classe="aq-bom";descricao="Nulo";}

 else if(v<=5){classe="aq-mod";descricao="Médio";}
 else if(v<=7){classe="aq-ruim";descricao="Alto";}
 else if(v<=10){classe="aq-muito";descricao=" Risco";}
 else{classe="aq-extremo";descricao="Extremo";}
 return {classe,descricao};
}

function calcularLua(data){
  const ref = new Date(Date.UTC(2000, 0, 6, 18, 14, 0));
  const ciclo = 29.530588853;

  const dias = (data.getTime() - ref.getTime()) / 86400000;
  const idade = ((dias % ciclo) + ciclo) % ciclo;
  const frac = idade / ciclo;

  const iluminacao = Math.round(
    (1 - Math.cos(2 * Math.PI * frac)) / 2 * 100
  );

  let fase = "";

  if (idade < 1.84566) fase = "Lua Nova 🌑";
  else if (idade < 5.53699) fase = "Lua Crescente 🌒";
  else if (idade < 9.22831) fase = "Quarto Crescente 🌓";
  else if (idade < 12.91963) fase = "Crescente Gibosa 🌔";
  else if (idade < 16.61096) fase = "Lua Cheia 🌕";
  else if (idade < 20.30228) fase = "Minguante Gibosa 🌖";
  else if (idade < 23.99361) fase = "Quarto Minguante 🌗";
  else if (idade < 27.68493) fase = "Lua Minguante 🌘";
  else fase = "Lua Nova 🌑";

  return {
    fase,
    iluminacao,
    idade: idade.toFixed(1)
  };
}

function formatarChuvaClasse(v){
 if(v<=20) return "chuva-bom";
 if(v<=40) return "chuva-mod";
 if(v<=60) return "chuva-ruim";
 if(v<=80) return "chuva-muito";
 return "chuva-extremo";
}

function definirStatus(p,c){

/* =========================
   PRESSÃO × CHUVA
========================= */
function calcularPressaoChuva(h){
 if(!h?.time) return;
 const dias={};
 h.time.forEach((t,i)=>{
  const d=t.split("T")[0];
  dias[d]??={p:[],mm:0};
  dias[d].p.push(h.pressure_msl[i]);
  dias[d].mm+=h.precipitation[i];
 });
 const press=[];
 Object.values(dias).forEach(d=>{
  if(d.mm>=1) press.push(d.p.reduce((a,b)=>a+b)/d.p.length);
 });
 if(press.length<3){
  linhaAviso.innerHTML="🌧️ *Dados insuficientes para padrão confiável.";
  return;
 }
}

function montarGrafico(h){
 if(!h?.time) return;

 const dias={}, chuva={};

 h.time.forEach((t,i)=>{
  const d=t.split("T")[0];
  dias[d] ??= [];
  dias[d].push(h.pressure_msl[i]);
  chuva[d]=(chuva[d]||0)+h.precipitation[i];
 });

 const labels=[], press=[], mm=[];
 Object.keys(dias).slice(-5).forEach(d=>{
  const p=d.split("-");
  labels.push(`${p[2]}/${p[1]}`);
  press.push((dias[d].reduce((a,b)=>a+b)/dias[d].length).toFixed(1));
  mm.push(chuva[d].toFixed(1));
 });

 chart?.destroy();
 chart=new Chart(
  document.getElementById("grafico"),{
   data:{
    labels,
    datasets:[
     {type:"line",label:"Pressão Média (hPa)",data:press,borderWidth:2,tension:.3},
     {type:"bar",label:"Chuva Acumulada (mm)",data:mm,yAxisID:"y1"}
    ]
   },
   options:{
    plugins:{
     title:{
      display:true,
      text:"Pressão Atmosférica × Chuva — Últimos 5 dias",
      font:{size:12,weight:"bold"},
      color:document.body.classList.contains("dark")?"#e6edf3":"#000"
     }
    },
    scales:{
     y:{title:{display:true,text:"Pressão (hPa)"}},
     y1:{
      position:"right",
      beginAtZero:true,
      grid:{drawOnChartArea:false},
      title:{display:true,text:"Chuva (mm)"}
     }
    }
   }
  }
 );
}


// =========================
// FUNÇÃO QUE MONTA TEXTO LIMPO PARA VOZ
// =========================
function montarTextoFalado() {

  const status = document.getElementById("linhaStatus");
  if (!status) return "";

  let textos = [];

  status.querySelectorAll("p, span, div").forEach(el => {

    if (el.id === "btnOuvir") return;
    if (el.querySelector("#btnOuvir")) return;

    const t = el.innerText?.trim();
    if (t) textos.push(t);
  });

  return textos.join(". ");
}


// =========================
// BOTÃO DE VOZ FUNCIONANDO
// =========================

if ("speechSynthesis" in window) {

  const btn = document.getElementById("btnOuvir");

  if (btn) {

    btn.onclick = function () {

      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btn.innerText = "🔊";
        return;
      }

      const texto = montarTextoFalado();
      if (!texto) return;

      const fala = new SpeechSynthesisUtterance(texto);
      fala.lang = "pt-BR";
      fala.rate = 0.95;
      fala.pitch = 1.1;

      fala.onstart = function () {
        btn.innerText = "⏸️";
      };

      fala.onend = function () {
        btn.innerText = "🔊";
      };

      fala.onerror = function () {
        btn.innerText = "🔊";
      };

      window.speechSynthesis.speak(fala);
    };

  }
}
